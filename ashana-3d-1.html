<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASHANA JOURNEYS — 3D Tee</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#fff; font-family:'Montserrat',sans-serif; overflow:hidden; height:100vh; }
  #bg { position:fixed; inset:0; background:radial-gradient(ellipse at 30% 40%,#141414 0%,#0a0a0a 60%,#050505 100%); z-index:0; }
  header {
    position:fixed; top:0; left:0; right:0; padding:18px 24px;
    display:flex; justify-content:space-between; align-items:center;
    z-index:10; border-bottom:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(12px); background:rgba(10,10,10,0.5);
  }
  .brand { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:5px; }
  .brand span { color:rgba(255,255,255,0.35); font-size:8px; letter-spacing:3px; font-family:'Montserrat',sans-serif; font-weight:300; display:block; margin-top:-2px; }
  .tagline { font-size:8px; letter-spacing:2px; color:rgba(255,255,255,0.22); font-weight:600; text-transform:uppercase; }
  #wrap { position:fixed; inset:0; z-index:5; cursor:grab; }
  #wrap:active { cursor:grabbing; }
  canvas { display:block; }
  .controls {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:10; display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; padding:0 16px;
  }
  .btn {
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.65); padding:8px 16px;
    font-family:'Montserrat',sans-serif; font-size:9px; font-weight:600; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer; transition:all 0.25s; backdrop-filter:blur(10px);
  }
  .btn:hover { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.3); }
  .btn.active { background:rgba(255,255,255,0.16); color:#fff; border-color:rgba(255,255,255,0.5); }
  .hint {
    position:fixed; bottom:72px; left:50%; transform:translateX(-50%);
    font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.18); z-index:10;
    text-transform:uppercase; animation:pulse 3s ease-in-out infinite; white-space:nowrap;
  }
  @keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.8} }
  #loading {
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:#0a0a0a; gap:20px;
  }
  #loading-text { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:5px; color:rgba(255,255,255,0.4); }
  .progress-bar { width:180px; height:1px; background:rgba(255,255,255,0.1); }
  .progress-fill { height:100%; background:rgba(255,255,255,0.5); width:0%; transition:width 0.3s; }
  #error-msg { display:none; color:rgba(255,100,100,0.8); font-size:10px; letter-spacing:1px; margin-top:12px; text-align:center; max-width:300px; line-height:1.8; }
  /* Hide all UI elements inside the iframe widget */
header, .controls, .hint { display: none !important; }

/* Prevent the browser from scrolling when swiping the 3D model */
html, body, #wrap { touch-action: none; overscroll-behavior: none; }

</style>
</head>
<body>
<div id="bg"></div>
<div id="loading">
  <div id="loading-text">LOADING ASHANA</div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div id="error-msg"></div>
</div>
<header>
  <div class="brand">ASHANA&#8482;<span>EST. 2026</span></div>
  <div class="tagline">Adventure &middot; Connection &middot; Experience</div>
</header>
<div id="wrap"><canvas id="c"></canvas></div>
<div class="hint">Drag to rotate &nbsp;&middot;&nbsp; Scroll to zoom</div>
<div class="controls">
  <button class="btn" id="btn-front">Front</button>
  <button class="btn" id="btn-back">Back</button>
  <button class="btn" id="btn-left">Left Sleeve</button>
  <button class="btn" id="btn-right">Right Sleeve</button>
  <button class="btn" id="btn-auto">Auto Rotate</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Texture builder ───────────────────────────────────────────────────────────
function buildAshanaTexture(material) {
  const S = 2048;
  const cv = document.createElement('canvas');
  cv.width = S; cv.height = S;
  const ctx = cv.getContext('2d');
  
  // 1. Paint the base shirt color and add fabric noise
  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, S, S);
  const id = ctx.getImageData(0,0,S,S);
  for (let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*14-7)|0;
    id.data[i]=Math.max(0,Math.min(255,id.data[i]+v));
    id.data[i+1]=Math.max(0,Math.min(255,id.data[i+1]+v));
    id.data[i+2]=Math.max(0,Math.min(255,id.data[i+2]+v));
  }
  ctx.putImageData(id,0,0);
  
  // 2. Create the texture and link it to the T-shirt material immediately
  const tex = new THREE.CanvasTexture(cv);
  tex.encoding = THREE.sRGBEncoding;
  tex.flipY = false;
  material.map = tex;

  // 3. Setup image loading
  const imgUrls = {
    chest: 'chest-logo.png',
    back: 'back-design.png',
    leftSleeve: 'left-sleeve.png',
    rightSleeve: 'right-sleeve.png'
  };
  
  const images = {};
  let loadedCount = 0;
  const totalImages = Object.keys(imgUrls).length;

  for (const [key, url] of Object.entries(imgUrls)) {
    const img = new Image();
    img.src = url;
    img.onload = () => {
      images[key] = img;
      loadedCount++;
      if (loadedCount === totalImages) applyImagesToCanvas();
    };
    img.onerror = () => { 
      console.warn("Could not load: " + url); 
      loadedCount++; 
      if (loadedCount === totalImages) applyImagesToCanvas(); 
    };
  }

    function applyImagesToCanvas() {
    function drawFlipped(img, cxRatio, cyRatio, widthRatio) {
      const cx = S * cxRatio;
      const cy = S * cyRatio;
      const targetWidth = S * widthRatio;
      
      const scale = targetWidth / img.width;
      const w = img.width * scale;
      const h = img.height * scale;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(1, -1); // Keeps everything right-side up and readable
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.restore();
    }

    // =======================================================
    // 🎯 CORRECTED UV COORDINATES
    // =======================================================
    
    // Front Chest (X: 0.25 is dead center. 0.32 moves it to the left breast)
    if (images.chest)       drawFlipped(images.chest,       0.35,  0.44,  0.10); 
    
    // Back Design (X: 0.75 is center back. Y: 0.18 drops it slightly below the collar)
    if (images.back)        drawFlipped(images.back,        0.75,  0.44,  0.28); 
    
    // Left Sleeve (EST. 2026) - Placed high up above the back torso
    if (images.leftSleeve)  drawFlipped(images.leftSleeve,  0.67, 0.80, 0.12); 
    
    // Right Sleeve (Mountain Wave) - Placed high up above the front torso
    if (images.rightSleeve) drawFlipped(images.rightSleeve, 0.30, 0.81, 0.12); 


    tex.needsUpdate = true;
  }

}


// ── Three.js setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42,1,0.01,100);
camera.position.set(0,0,3.2);

function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize',resize);

// Lights
const ambient = new THREE.AmbientLight(0xffffff,0.7); scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffffff,1.6); keyLight.position.set(2,4,3); keyLight.castShadow=true; scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x8899ff,0.4); fillLight.position.set(-3,1,-2); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff,0.9); rimLight.position.set(0,5,-4); scene.add(rimLight);

// ── GLB parser ────────────────────────────────────────────────────────────────
function parseGLB(buffer){
  const view=new DataView(buffer); let off=12;
  const jsonLen=view.getUint32(off,true); off+=8;
  const gltf=JSON.parse(new TextDecoder().decode(new Uint8Array(buffer,off,jsonLen))); off+=jsonLen;
  const binLen=view.getUint32(off,true); off+=8;
  return { gltf, bin:buffer.slice(off,off+binLen) };
}

function getAccessor(gltf,bin,idx){
  const acc=gltf.accessors[idx], bv=gltf.bufferViews[acc.bufferView];
  const byteOff=(bv.byteOffset||0)+(acc.byteOffset||0);
  const cb={5120:1,5121:1,5122:2,5123:2,5125:4,5126:4}[acc.componentType];
  const tc={SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16}[acc.type];
  const slice=bin.slice(byteOff,byteOff+acc.count*tc*cb);
  const T=acc.componentType===5126?Float32Array:acc.componentType===5125?Uint32Array:acc.componentType===5123?Uint16Array:Uint8Array;
  return new T(slice);
}

async function buildFromGLB(buffer){
  const {gltf,bin}=parseGLB(buffer);

  const material=new THREE.MeshStandardMaterial({
    roughness:0.82, metalness:0.0, side:THREE.DoubleSide
  });

  // Call the new texture builder and pass in the material
  buildAshanaTexture(material);

  const innerGroup=new THREE.Group();
  
  for(const mesh of gltf.meshes){
    for(const prim of mesh.primitives){
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(getAccessor(gltf,bin,prim.attributes.POSITION),3));
      geo.setAttribute('normal',new THREE.BufferAttribute(getAccessor(gltf,bin,prim.attributes.NORMAL),3));
      if(prim.attributes.TEXCOORD_0!==undefined)
        geo.setAttribute('uv',new THREE.BufferAttribute(getAccessor(gltf,bin,prim.attributes.TEXCOORD_0),2));
      if(prim.indices!==undefined)
        geo.setIndex(new THREE.BufferAttribute(getAccessor(gltf,bin,prim.indices),1));
      const m=new THREE.Mesh(geo,material);
      m.castShadow=true; m.receiveShadow=true;
      innerGroup.add(m);
    }
  }

  // FIX: Read matrix directly without transposing
  const rootMatrix = gltf.nodes[0] && gltf.nodes[0].matrix;
  if(rootMatrix){
    const m4=new THREE.Matrix4().fromArray(rootMatrix);
    innerGroup.applyMatrix4(m4);
  }

  // Calculate box and center the model
  const box=new THREE.Box3().setFromObject(innerGroup);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());

  innerGroup.position.x -= center.x;
  innerGroup.position.y -= center.y;
  innerGroup.position.z -= center.z;

  const maxDim=Math.max(size.x,size.y,size.z);
  const scale=1.6/maxDim;
  innerGroup.scale.setScalar(scale);
  innerGroup.position.multiplyScalar(scale);
  
  const outerGroup = new THREE.Group();
  outerGroup.add(innerGroup);

  return outerGroup;
}

// ── Interaction ───────────────────────────────────────────────────────────────
let tshirt=null, autoRotate=false;
let rotY=0, rotX=0.05, velX=0, velY=0, isDragging=false;
let prevMouse={x:0,y:0}, targetRotY=0, targetRotX=0.05, animTo=false;

const wrap=document.getElementById('wrap');
wrap.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};velX=velY=0;autoRotate=false;document.getElementById('btn-auto').classList.remove('active');});
wrap.addEventListener('mousemove',e=>{if(!isDragging)return;velY=(e.clientX-prevMouse.x)*0.006;velX=(e.clientY-prevMouse.y)*0.004;rotY+=velY;rotX=Math.max(-0.5,Math.min(0.5,rotX+velX));prevMouse={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>isDragging=false);
wrap.addEventListener('touchstart',e=>{isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};velX=velY=0;autoRotate=false;},{passive:true});
wrap.addEventListener('touchmove',e=>{e.preventDefault();if(!isDragging)return;velY=(e.touches[0].clientX-prevMouse.x)*0.007;velX=(e.touches[0].clientY-prevMouse.y)*0.005;rotY+=velY;rotX=Math.max(-0.5,Math.min(0.5,rotX+velX));prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
window.addEventListener('touchend',()=>isDragging=false);
wrap.addEventListener('wheel',e=>{camera.position.z=Math.max(1.5,Math.min(6,camera.position.z+e.deltaY*0.003));});

function snapTo(yr,xr){autoRotate=false;document.getElementById('btn-auto').classList.remove('active');targetRotY=yr;targetRotX=xr;animTo=true;}
document.getElementById('btn-front').addEventListener('click',()=>snapTo(0,0.05));
document.getElementById('btn-back').addEventListener('click', ()=>snapTo(Math.PI,0.05));
document.getElementById('btn-left').addEventListener('click', ()=>snapTo(Math.PI*0.5,0));
document.getElementById('btn-right').addEventListener('click',()=>snapTo(-Math.PI*0.5,0));
document.getElementById('btn-auto').addEventListener('click',function(){autoRotate=!autoRotate;this.classList.toggle('active',autoRotate);animTo=false;});

let t=0;
(function animate(){
  requestAnimationFrame(animate); t+=0.008;
  if(animTo){
    let dY=targetRotY-rotY;
    while(dY>Math.PI)dY-=Math.PI*2; while(dY<-Math.PI)dY+=Math.PI*2;
    rotY+=dY*0.08; rotX+=(targetRotX-rotX)*0.08;
    if(Math.abs(dY)<0.002&&Math.abs(targetRotX-rotX)<0.002){rotY=targetRotY;rotX=targetRotX;animTo=false;}
  } else if(autoRotate){
    rotY+=0.007;
  } else if(!isDragging){
    velX*=0.9; velY*=0.9; rotY+=velY; rotX+=velX;
  }
  if(tshirt){tshirt.rotation.y=rotY;tshirt.rotation.x=rotX;tshirt.position.y=Math.sin(t)*0.012;}
  renderer.render(scene,camera);
})();

// ── Fetch & load ──────────────────────────────────────────────────────────────
const prog=document.getElementById('prog');
prog.style.width='15%';
fetch('tshirt.glb')
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status+' — tshirt.glb not found in same folder');prog.style.width='50%';return r.arrayBuffer();})
  .then(buf=>{prog.style.width='75%';return buildFromGLB(buf);})
  .then(group=>{tshirt=group;scene.add(tshirt);prog.style.width='100%';setTimeout(()=>document.getElementById('loading').style.display='none',350);})
  .catch(err=>{
    console.error(err);
    document.getElementById('loading-text').textContent='LOAD FAILED';
    const em=document.getElementById('error-msg'); em.style.display='block'; em.textContent=err.message;
    prog.style.background='rgba(255,80,80,0.5)'; prog.style.width='100%';
  });
  // Send a message to the main website when the T-shirt is tapped (not dragged)
let tapStartX = 0, tapStartY = 0, tapTime = 0;

wrap.addEventListener('pointerdown', (e) => {
  tapStartX = e.clientX; tapStartY = e.clientY; tapTime = Date.now();
});

wrap.addEventListener('pointerup', (e) => {
  const distance = Math.abs(e.clientX - tapStartX) + Math.abs(e.clientY - tapStartY);
  // If finger moved less than 10 pixels and tap was fast, count it as a "tap"
  if (distance < 10 && Date.now() - tapTime < 300) {
    window.parent.postMessage('toggle-product-btn', '*');
  }
});

</script>
</body>
</html>
