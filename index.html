<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      min-height: 100dvh; /* fixes mobile browser height issues */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: clamp(24px, 6vw, 40px);
      margin-bottom: 10px;
    }

    p {
      font-size: clamp(14px, 4vw, 18px);
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      opacity: 0.5;
    }

    /* Extra mobile fixes */
    @media (max-width: 400px) {
      .container {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚧 Under Construction</h1>
    <p>We're working on something awesome. Stay tuned.</p>

    <div class="loader"></div>

    <div class="footer">
      © 2026 Your Brand
    </div>
  </div>
</body>
</html>
